name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - claude/**
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build for Cloudflare
        run: npx @opennextjs/cloudflare build --dangerouslyUseUnsupportedNextVersion
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Prepare deployment
        run: |
          echo "📦 Preparing deployment directory..."
          cp .open-next/worker.js .open-next/assets/_worker.js
          echo "✅ _worker.js copied to assets/"
          echo "📁 Assets structure:"
          find .open-next/assets -maxdepth 3 -type f | head -20

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .open-next/assets --project-name=cssberlin --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed!"
          echo "🌐 Site: https://cssberlin.de"
