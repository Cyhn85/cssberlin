name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - claude/**
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build for Cloudflare
        run: npm run cf:build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Create Cloudflare Pages Project (if not exists)
        run: |
          npx wrangler pages project create cssberlin --production-branch=main || echo "Project may already exist, continuing..."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .worker-next --project-name=cssberlin --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed!"
          echo "🌐 Site: https://cssberlin.pages.dev"
          echo "📦 Build artifacts in .worker-next/"
