name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - claude/**
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build for Cloudflare
        run: npm run cf:build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Create Cloudflare Pages Project (if not exists)
        run: |
          echo "Creating Cloudflare Pages project via API..."
          RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"name":"cssberlin","production_branch":"main","build_config":{"build_command":"","destination_dir":"","root_dir":""}}')
          echo "$RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "✅ Project created successfully!"
          elif echo "$RESPONSE" | grep -q '"code":"already_exists"'; then
            echo "✅ Project already exists, continuing..."
          else
            echo "⚠️ Unexpected response, but continuing..."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .open-next --project-name=cssberlin --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed!"
          echo "🌐 Site: https://cssberlin.pages.dev"
          echo "📦 Build artifacts in .worker-next/"
